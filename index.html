<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4efe6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Biz English">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Daily Business English</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Business Dialogue</p>
          <h1>Listen. Repeat. Review.</h1>
        </div>
        <span class="review-pill" id="review-status">Today</span>
      </header>

      <section class="lesson-panel" aria-labelledby="lesson-title">
        <div class="lesson-meta">
          <span id="today-date">Today</span>
          <span id="review-stage">New</span>
        </div>
        <h2 id="lesson-title">Loading...</h2>
        <p id="lesson-scenario"></p>
        <button class="primary-button" id="play-dialogue" type="button">Play Dialogue</button>
      </section>

      <section class="subtitle-panel" aria-label="Dialogue subtitles">
        <div class="subtitle-header">
          <span>Subtitle</span>
          <span id="line-count">1 / 1</span>
        </div>
        <div class="subtitle-card" id="subtitle-card">
          <p class="speaker-name" id="active-speaker">Speaker</p>
          <p class="subtitle-text" id="active-text">Ready</p>
          <p class="subtitle-translation" id="active-translation"></p>
        </div>
      </section>

      <section class="dialogue-list" id="dialogue-list" aria-label="Conversation lines"></section>

      <section class="word-panel" aria-labelledby="word-title">
        <div class="section-heading">
          <p class="section-label">3 Key Phrases</p>
          <h2 id="word-title">Vocabulary in context</h2>
        </div>
        <ul class="word-list" id="word-list"></ul>
      </section>

      <section class="repeat-panel" aria-labelledby="repeat-title">
        <div class="section-heading">
          <p class="section-label">Repeat Practice</p>
          <h2 id="repeat-title">Shadow one line</h2>
        </div>
        <p id="repeat-line"></p>
        <div class="button-row">
          <button class="secondary-button" id="play-line" type="button">Play Line</button>
          <button class="secondary-button" id="next-line" type="button">Next Line</button>
        </div>
      </section>

      <section class="review-panel" aria-labelledby="review-title">
        <div class="section-heading">
          <p class="section-label">Spaced Review</p>
          <h2 id="review-title">How did it feel?</h2>
        </div>
        <p id="next-review-copy">Choose after practice to schedule your next review.</p>
        <div class="review-actions">
          <button id="again-button" type="button">Again</button>
          <button id="good-button" type="button">Good</button>
          <button id="easy-button" type="button">Easy</button>
        </div>
      </section>

      <nav class="bottom-actions" aria-label="Lesson navigation">
        <button id="previous-button" type="button">Previous</button>
        <button id="next-lesson-button" type="button">Next</button>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
