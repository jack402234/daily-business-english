<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4efe6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Biz English">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Daily Business English</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">&#x5546;&#x52D9;&#x5C0D;&#x8A71;</p>
          <h1>&#x807D;&#x3001;&#x8907;&#x8AA6;&#x3001;&#x8907;&#x7FD2;</h1>
        </div>
        <span class="review-pill" id="review-status">&#x4ECA;&#x65E5;</span>
      </header>

      <section class="lesson-panel" aria-labelledby="lesson-title">
        <div class="lesson-meta">
          <span id="today-date">&#x4ECA;&#x65E5;</span>
          <span id="review-stage">&#x65B0;&#x8AB2;&#x7A0B;</span>
        </div>
        <h2 id="lesson-title">&#x8F09;&#x5165;&#x4E2D;...</h2>
        <p id="lesson-scenario"></p>
        <button class="primary-button" id="play-dialogue" type="button">&#x64AD;&#x653E;&#x5C0D;&#x8A71;</button>
      </section>

      <section class="subtitle-panel" aria-label="Dialogue subtitles">
        <div class="subtitle-header">
          <span>&#x5B57;&#x5E55;</span>
          <span id="line-count">1 / 1</span>
        </div>
        <div class="subtitle-card" id="subtitle-card">
          <p class="speaker-name" id="active-speaker">&#x8AAA;&#x8A71;&#x8005;</p>
          <p class="subtitle-text" id="active-text">&#x6E96;&#x5099;&#x958B;&#x59CB;</p>
          <p class="subtitle-translation" id="active-translation"></p>
        </div>
      </section>

      <section class="dialogue-list" id="dialogue-list" aria-label="Conversation lines"></section>

      <section class="word-panel" aria-labelledby="word-title">
        <div class="section-heading">
          <p class="section-label">3 &#x500B;&#x95DC;&#x9375;&#x7247;&#x8A9E;</p>
          <h2 id="word-title">&#x5C0D;&#x8A71;&#x4E2D;&#x7684;&#x7528;&#x6CD5;</h2>
        </div>
        <ul class="word-list" id="word-list"></ul>
      </section>

      <section class="repeat-panel" aria-labelledby="repeat-title">
        <div class="section-heading">
          <p class="section-label">&#x8907;&#x8AA6;&#x7DF4;&#x7FD2;</p>
          <h2 id="repeat-title">&#x8DDF;&#x8B80;&#x4E00;&#x53E5;</h2>
        </div>
        <p id="repeat-line"></p>
        <div class="button-row">
          <button class="secondary-button" id="play-line" type="button">&#x64AD;&#x653E;&#x672C;&#x53E5;</button>
          <button class="secondary-button" id="next-line" type="button">&#x4E0B;&#x4E00;&#x53E5;</button>
        </div>
      </section>

      <section class="review-panel" aria-labelledby="review-title">
        <div class="section-heading">
          <p class="section-label">&#x9593;&#x9694;&#x8907;&#x7FD2;</p>
          <h2 id="review-title">&#x9019;&#x6BB5;&#x719F;&#x6089;&#x55CE;&#xFF1F;</h2>
        </div>
        <p id="next-review-copy">&#x7DF4;&#x7FD2;&#x5F8C;&#x9078;&#x64C7;&#x719F;&#x6089;&#x5EA6;&#xFF0C;&#x7CFB;&#x7D71;&#x6703;&#x5E6B;&#x4F60;&#x5B89;&#x6392;&#x4E0B;&#x6B21;&#x8907;&#x7FD2;&#x3002;</p>
        <div class="review-actions">
          <button id="again-button" type="button">&#x518D;&#x7DF4;&#x4E00;&#x6B21;</button>
          <button id="good-button" type="button">&#x9084;&#x4E0D;&#x932F;</button>
          <button id="easy-button" type="button">&#x5F88;&#x719F;</button>
        </div>
      </section>

      <nav class="bottom-actions" aria-label="Lesson navigation">
        <button id="previous-button" type="button">&#x4E0A;&#x4E00;&#x6BB5;</button>
        <button id="next-lesson-button" type="button">&#x4E0B;&#x4E00;&#x6BB5;</button>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
